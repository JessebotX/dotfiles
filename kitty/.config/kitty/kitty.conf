# BEGIN_KITTY_THEME
# Ayu
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family      family="Maple Mono NL NF"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

cursor_blink_interval 0
cursor_trail          1
enable_audio_bell     no
shell_integration     no-cursor

include machine.conf

tab_bar_edge        top
tab_bar_style       powerline
tab_powerline_style round

scrollback_lines 10000

map control+alt+t new_tab_with_cwd
map control+alt+w close_window
map control+alt+h previous_tab
map control+alt+l next_tab
map alt+j         scroll_line_down
map alt+k         scroll_line_up
map alt+shift+j   scroll_page_down
map alt+shift+k   scroll_page_up
